<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEM Setups</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e2e8f0;font-size:13px}
#header{background:#161b22;border-bottom:2px solid #21262d;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header h1{font-size:15px;font-weight:700;color:#60a5fa;letter-spacing:1px}
#load-btn{background:#22c55e;color:#fff;border:none;padding:7px 16px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
#load-btn:hover{background:#16a34a}
#status{font-size:11px;color:#6b7280}
#controls{padding:10px 18px;background:#0d1117;border-bottom:1px solid #21262d;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=text]{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 10px;border-radius:4px;font-size:12px;width:160px}
select{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 8px;border-radius:4px;font-size:12px}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e2533;color:#94a3b8;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px 10px;border-top:1px solid #1a2533;white-space:nowrap}
tr:hover td{background:#1a2533}
.t1{color:#fbbf24;font-weight:700}.t2{color:#22c55e;font-weight:600}.t3{color:#60a5fa}.t4{color:#94a3b8}.t5{color:#6b7280}
.src-penny{background:#0d1a0d;border-left:3px solid #22c55e}
.src-bigcap{background:#0d1020;border-left:3px solid #60a5fa}
.src-swing{background:#160d20;border-left:3px solid #a78bfa}
#empty{padding:60px;text-align:center;color:#6b7280;display:none}
</style>
</head>
<body>
<div id="header">
  <div><h1>FEM SETUPS</h1><div class="sub" id="status">Load your Master Fem Fresh Scans folder</div></div>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="file-summary" style="font-size:11px;color:#6b7280"></div>
    <button id="load-btn" onclick="loadFolder()">📂 Load Folder</button>
  </div>
</div>
<div id="controls" style="display:none">
  <input type="text" id="filter-ticker" placeholder="Filter ticker..." oninput="applyFilters()">
  <select id="filter-source" onchange="applyFilters()">
    <option value="">All Sources</option>
    <option value="PENNY">Penny</option>
    <option value="BIGCAP">BigCap</option>
    <option value="SWING">Swing</option>
  </select>
  <select id="filter-side" onchange="applyFilters()">
    <option value="">Both Sides</option>
    <option value="Long">Long</option>
    <option value="Short">Short</option>
  </select>
  <select id="filter-date" onchange="applyFilters()"><option value="">All Dates</option></select>
  <span id="summary" style="font-size:11px;color:#6b7280;margin-left:8px"></span>
</div>
<div class="tw">
  <table id="main-tbl">
    <thead><tr><th>Date</th><th>Source</th><th>Ticker</th><th>Side</th><th>Mode</th><th>Tier</th><th>FEM</th><th>Entry</th><th>Stop</th><th>T1</th><th>R:R</th><th>Float</th><th>Proximity</th></tr></thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>
<div id="empty">No setups match your filters.</div>
<script>
let ALL_ROWS=[];
function parseCSV(t){const l=t.trim().split('\n');if(l.length<2)return[];const h=l[0].split(',').map(x=>x.trim().toLowerCase());return l.slice(1).map(line=>{const v=line.split(',');const o={};h.forEach((k,i)=>o[k]=(v[i]||'').trim());return o;});}
function dateFromName(n){const m=n.match(/(\d{4}-\d{2}-\d{2})/g);return m?m[m.length-1]:'?';}
function srcFromName(n){if(n.startsWith('fem_penny_scan_'))return'PENNY';if(n.startsWith('fem_scan_v8_')||n.startsWith('fem_bigcap_scan_'))return'BIGCAP';if(n.startsWith('fem_swing_'))return'SWING';return null;}
function tierOrd(t){if(!t)return 9;if(t.includes('T1'))return 1;if(t.includes('T2'))return 2;if(t.includes('T3'))return 3;if(t.includes('T4'))return 4;return 5;}
function tierCls(t){if(!t)return'';if(t.includes('T1'))return't1';if(t.includes('T2'))return't2';if(t.includes('T3'))return't3';return't4';}
function fmt(v){const n=parseFloat(v);if(isNaN(n)||n===0)return'--';return'$'+n.toFixed(3);}
async function loadFolder(){
  try{
    const dir=await window.showDirectoryPicker();
    const files=[];
    for await(const e of dir.values()){
      if(e.kind!=='file'||!e.name.endsWith('.csv'))continue;
      const src=srcFromName(e.name);
      if(!src)continue;
      files.push({entry:e,name:e.name,src,date:dateFromName(e.name)});
    }
    files.sort((a,b)=>a.name.localeCompare(b.name));
    ALL_ROWS=[];
    for(const f of files){
      const text=await(await f.entry.getFile()).text();
      parseCSV(text).forEach(r=>{
        ALL_ROWS.push({_src:f.src,_date:f.date,ticker:r.ticker||r.symbol||'',side:r.side||'',mode:r.mode||'',tier:r.tier||'',fem:r.fem||'',entry:r.entry||'',stop:r.stop||'',t1:r.t1||'',rr:r.rr||'',float_label:r.float_label||r.float||'',proximity:r.proximity||''});
      });
    }
    ALL_ROWS.sort((a,b)=>{if(b._date!==a._date)return b._date.localeCompare(a._date);const td=tierOrd(a.tier)-tierOrd(b.tier);if(td)return td;return(parseFloat(b.fem)||0)-(parseFloat(a.fem)||0);});
    const dates=[...new Set(ALL_ROWS.map(r=>r._date))].sort().reverse();
    const ds=document.getElementById('filter-date');
    ds.innerHTML='<option value="">All Dates</option>';
    dates.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o);});
    document.getElementById('controls').style.display='flex';
    document.getElementById('file-summary').textContent=files.length+' files / '+ALL_ROWS.length+' setups';
    document.getElementById('status').textContent='Loaded '+files.length+' scan files';
    applyFilters();
  }catch(e){if(e.name!=='AbortError')document.getElementById('status').textContent='Error: '+e.message;}
}
function applyFilters(){
  const tk=document.getElementById('filter-ticker').value.toLowerCase();
  const src=document.getElementById('filter-source').value;
  const side=document.getElementById('filter-side').value;
  const date=document.getElementById('filter-date').value;
  const f=ALL_ROWS.filter(r=>{
    if(tk&&!r.ticker.toLowerCase().includes(tk))return false;
    if(src&&r._src!==src)return false;
    if(side&&r.side!==side)return false;
    if(date&&r._date!==date)return false;
    return true;
  });
  document.getElementById('tbl-body').innerHTML=f.map(r=>{
    const sc=r._src==='PENNY'?'src-penny':r._src==='BIGCAP'?'src-bigcap':'src-swing';
    const scol=r.side==='Long'?'#22c55e':'#ef4444';
    const fn=parseFloat(r.fem)||0;
    const fcol=fn>=80?'#fbbf24':fn>=60?'#22c55e':'#60a5fa';
    const srcCol=r._src==='PENNY'?'#22c55e':r._src==='BIGCAP'?'#60a5fa':'#a78bfa';
    const pcol=r.proximity==='WAITING'?'#6b7280':r.proximity==='CLOSE'||r.proximity==='INSIDE'?'#fbbf24':'#22c55e';
    return '<tr class="'+sc+'"><td style="color:#6b7280;font-size:11px">'+r._date+'</td><td style="font-size:10px;font-weight:700;color:'+srcCol+'">'+r._src+'</td><td style="font-weight:700">'+r.ticker+'</td><td style="color:'+scol+';font-weight:600">'+r.side+'</td><td style="color:#94a3b8;font-size:11px">'+r.mode+'</td><td class="'+tierCls(r.tier)+'">'+r.tier+'</td><td style="color:'+fcol+';font-weight:600">'+r.fem+'</td><td>'+fmt(r.entry)+'</td><td style="color:#ef4444">'+fmt(r.stop)+'</td><td style="color:#22c55e">'+fmt(r.t1)+'</td><td style="font-weight:600">'+(r.rr?r.rr+'x':'--')+'</td><td style="color:#94a3b8">'+r.float_label+'</td><td style="color:'+pcol+'">'+r.proximity+'</td></tr>';
  }).join('');
  const emp=document.getElementById('empty');
  emp.style.display=f.length===0&&ALL_ROWS.length>0?'block':'none';
  document.getElementById('summary').textContent=f.length+' setups';
}
</script>
</body>
</html>
