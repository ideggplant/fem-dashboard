<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEM Setups</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#e2e8f0;font-size:13px}
#header{background:#161b22;border-bottom:2px solid #21262d;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header h1{font-size:15px;font-weight:700;color:#60a5fa;letter-spacing:1px}
#load-btn{background:#374151;color:#9ca3af;border:none;padding:7px 16px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
#load-btn:hover{background:#4b5563;color:#e2e8f0}
#reload-btn{background:#1d4ed8;color:#fff;border:none;padding:7px 14px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
#reload-btn:hover{background:#2563eb}
#status{font-size:11px;color:#6b7280;margin-top:2px}
#controls{padding:10px 18px;background:#0d1117;border-bottom:1px solid #21262d;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input[type=text]{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 10px;border-radius:4px;font-size:12px;width:150px}
select{background:#161b22;border:1px solid #30363d;color:#e2e8f0;padding:5px 8px;border-radius:4px;font-size:12px}
#scoreboard{padding:10px 18px;background:#0d1117;border-bottom:1px solid #21262d;display:none;gap:24px;flex-wrap:wrap}
.kpi{background:#161b22;border:1px solid #21262d;border-radius:6px;padding:8px 14px;min-width:100px}
.kpi .lbl{font-size:10px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.kpi .val{font-size:18px;font-weight:700}
.kpi.t1 .val{color:#fbbf24}.kpi.t2 .val{color:#22c55e}.kpi.t3 .val{color:#60a5fa}.kpi.all .val{color:#e2e8f0}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#1e2533;color:#94a3b8;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;position:sticky;top:0;z-index:2}
td{padding:6px 10px;border-top:1px solid #1a2533;white-space:nowrap}
tr:hover td{background:#1a2533}
.t1{color:#fbbf24;font-weight:700}.t2{color:#22c55e;font-weight:600}.t3{color:#60a5fa}.t4{color:#94a3b8}
.src-penny{border-left:3px solid #22c55e}
.src-bigcap{border-left:3px solid #60a5fa}
.src-swing{border-left:3px solid #a78bfa}
.oc-win{color:#22c55e;font-weight:700}
.oc-loss{color:#ef4444;font-weight:700}
.oc-stop{color:#ef4444}
.oc-live{color:#fbbf24}
.oc-nofill{color:#6b7280}
.oc-none{color:#374151}
#empty{padding:60px;text-align:center;color:#6b7280;display:none}
.gh-badge{font-size:10px;color:#22c55e;background:#0d2311;border:1px solid #22c55e44;border-radius:3px;padding:2px 6px;margin-left:8px}
.local-badge{font-size:10px;color:#fbbf24;background:#1a1200;border:1px solid #fbbf2444;border-radius:3px;padding:2px 6px;margin-left:8px}
</style>
</head>
<body>

<div id="header">
  <div>
    <h1>FEM SETUPS <span id="mode-badge"></span></h1>
    <div id="status">Fetching latest scans from GitHub...</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="file-summary" style="font-size:11px;color:#6b7280"></div>
    <button id="reload-btn" onclick="loadFromGitHub()" title="Reload from GitHub">↻ GitHub</button>
    <button id="load-btn" onclick="loadFolder()" title="Load local folder (your PC only)">📁 Local</button>
  </div>
</div>

<div id="scoreboard">
  <div class="kpi all"><div class="lbl">All Win Rate</div><div class="val" id="sc-all">--</div></div>
  <div class="kpi t1"><div class="lbl">T1 Win Rate</div><div class="val" id="sc-t1">--</div></div>
  <div class="kpi t2"><div class="lbl">T2 Win Rate</div><div class="val" id="sc-t2">--</div></div>
  <div class="kpi t3"><div class="lbl">T3 Win Rate</div><div class="val" id="sc-t3">--</div></div>
  <div class="kpi all"><div class="lbl">Avg R (all)</div><div class="val" id="sc-r">--</div></div>
  <div class="kpi t1"><div class="lbl">Avg R (T1)</div><div class="val" id="sc-r1">--</div></div>
  <div class="kpi all"><div class="lbl">Entry Accuracy</div><div class="val" id="sc-ea">--</div></div>
</div>

<div id="controls" style="display:none">
  <input type="text" id="filter-ticker" placeholder="Filter ticker..." oninput="applyFilters()">
  <select id="filter-source" onchange="applyFilters()">
    <option value="">All Sources</option>
    <option value="PENNY">Penny</option>
    <option value="BIGCAP">BigCap</option>
    <option value="SWING">Swing</option>
  </select>
  <select id="filter-side" onchange="applyFilters()">
    <option value="">Both Sides</option>
    <option value="Long">Long</option>
    <option value="Short">Short</option>
  </select>
  <select id="filter-tier" onchange="applyFilters()">
    <option value="">All Tiers</option>
    <option value="T1">T1</option>
    <option value="T2">T2</option>
    <option value="T3">T3</option>
  </select>
  <select id="filter-outcome" onchange="applyFilters()">
    <option value="">All Outcomes</option>
    <option value="TARGET_HIT">WIN (Target Hit)</option>
    <option value="STOPPED">STOPPED (Loss)</option>
    <option value="WINNING">WINNING (Live+)</option>
    <option value="LOSING">LOSING (Live-)</option>
    <option value="NO_FILL">NO_FILL</option>
    <option value="UNCHECKED">Unchecked</option>
  </select>
  <select id="filter-date" onchange="applyFilters()">
    <option value="">All Dates</option>
  </select>
  <span id="summary" style="font-size:11px;color:#6b7280;margin-left:4px"></span>
</div>

<div class="tw">
  <table id="main-tbl">
    <thead>
      <tr>
        <th>Date</th>
        <th>Src</th>
        <th>Ticker</th>
        <th>Side</th>
        <th>Mode</th>
        <th>Tier</th>
        <th>FEM</th>
        <th>Entry</th>
        <th>Stop</th>
        <th>T1</th>
        <th>R:R</th>
        <th>Float</th>
        <th>Outcome</th>
        <th>Result R</th>
        <th>Last Px</th>
        <th>Entry diff%</th>
      </tr>
    </thead>
    <tbody id="tbl-body"></tbody>
  </table>
</div>
<div id="empty">No setups match your filters.</div>

<script>
let ALL_ROWS = [];

// ── GitHub config ───────────────────────────────────────────────────────────
const GH_RAW = 'https://raw.githubusercontent.com/ideggplant/fem-dashboard/main/scans/';
const GH_MANIFEST = GH_RAW + 'manifest.json';

// ── CSV / name helpers ──────────────────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(line=>{
    const vals = line.split(',');
    const obj = {};
    headers.forEach((h,i)=>obj[h]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function dateFromName(n){
  const m = n.match(/(\d{4}-\d{2}-\d{2})/g);
  return m ? m[m.length-1] : '?';
}

function srcFromName(n){
  if(n.startsWith('fem_penny_scan_')) return 'PENNY';
  if(n.startsWith('fem_scan_v8_') || n.startsWith('fem_bigcap_scan_')) return 'BIGCAP';
  if(n.startsWith('fem_swing_')) return 'SWING';
  return null;
}

function isCheckFile(n){
  return n.startsWith('fem_check_') && n.endsWith('.csv');
}

// ── Tier helpers ────────────────────────────────────────────────────────────
function tierOrd(t){
  if(!t) return 9;
  if(t.includes('T1')) return 1;
  if(t.includes('T2')) return 2;
  if(t.includes('T3')) return 3;
  if(t.includes('T4')) return 4;
  return 5;
}

function tierCls(t){
  if(!t) return '';
  if(t.includes('T1')) return 't1';
  if(t.includes('T2')) return 't2';
  if(t.includes('T3')) return 't3';
  return 't4';
}

function fmt(v, dec=3){
  const n = parseFloat(v);
  if(isNaN(n) || n===0) return '--';
  return '$' + n.toFixed(dec);
}

function pct(v){
  const n = parseFloat(v);
  if(isNaN(n)) return '--';
  return (n>=0?'+':'') + n.toFixed(1) + '%';
}

// ── Stats ───────────────────────────────────────────────────────────────────
function winRate(rows){
  const resolved = rows.filter(r=>r._outcome && ['TARGET_HIT','STOPPED'].includes(r._outcome));
  if(!resolved.length) return null;
  const wins = resolved.filter(r=>r._outcome==='TARGET_HIT').length;
  return Math.round(wins/resolved.length*100) + '% (' + wins + '/' + resolved.length + ')';
}

function avgR(rows){
  const resolved = rows.filter(r=>r._outcome && ['TARGET_HIT','STOPPED'].includes(r._outcome) && r._result_r !== '' && !isNaN(parseFloat(r._result_r)));
  if(!resolved.length) return null;
  const avg = resolved.reduce((s,r)=>s+parseFloat(r._result_r),0)/resolved.length;
  return (avg>=0?'+':'') + avg.toFixed(2) + 'R';
}

function entryAccuracy(rows){
  const checked = rows.filter(r=>r._last_px && r.entry && parseFloat(r.entry)>0 && parseFloat(r._last_px)>0);
  if(!checked.length) return null;
  const close = checked.filter(r=>{
    const delta = Math.abs(parseFloat(r._last_px)-parseFloat(r.entry))/parseFloat(r.entry)*100;
    return delta <= 2.0;
  });
  return Math.round(close.length/checked.length*100) + '%';
}

// ── Core: process a list of {name, getText} entries ─────────────────────────
async function processFiles(entries){
  const scanEntries = [], checkEntries = [];
  for(const e of entries){
    if(!e.name.endsWith('.csv')) continue;
    if(isCheckFile(e.name)) checkEntries.push(e);
    else if(srcFromName(e.name)) scanEntries.push(e);
  }

  // Load check files -> outcome map
  const outcomeMap = {};
  for(const e of checkEntries){
    const text = await e.getText();
    parseCSV(text).forEach(r=>{
      if(!r.ticker) return;
      const sd = (r.scan_date || dateFromName(e.name)).substring(0, 10);
      const key = r.ticker.toUpperCase() + '|' + sd;
      outcomeMap[key] = {
        outcome: r.outcome || '',
        result_r: r.result_r || '',
        last_px: r.last_px || '',
      };
    });
  }

  // Load scan files
  scanEntries.sort((a,b)=>a.name.localeCompare(b.name));
  ALL_ROWS = [];
  for(const e of scanEntries){
    const src = srcFromName(e.name);
    const date = dateFromName(e.name);
    const text = await e.getText();
    parseCSV(text).forEach(r=>{
      if(!r.ticker) return;
      const key = r.ticker.toUpperCase() + '|' + date;
      const oc = outcomeMap[key] || {};
      let entryDelta = '';
      if(oc.last_px && r.entry && parseFloat(r.entry)>0){
        const d = (parseFloat(oc.last_px)-parseFloat(r.entry))/parseFloat(r.entry)*100;
        entryDelta = (d>=0?'+':'') + d.toFixed(1) + '%';
      }
      ALL_ROWS.push({
        _src: src, _date: date, _file: e.name,
        _outcome: oc.outcome || '',
        _result_r: oc.result_r || '',
        _last_px: oc.last_px || '',
        _entry_delta: entryDelta,
        ticker: r.ticker||'',
        side: r.side||'',
        mode: r.mode||'',
        tier: r.tier||'',
        fem: r.fem||'',
        entry: r.entry||'',
        stop: r.stop||'',
        t1: r.t1||'',
        rr: r.rr||'',
        float_m: r.float_m||'',
        float_label: r.float_label||r.float||'',
        proximity: r.proximity||'',
      });
    });
  }

  // Deduplicate: keep row with outcome over one without
  const dedupMap = {};
  ALL_ROWS.forEach(r=>{
    const k = r.ticker + '|' + r._date + '|' + r.entry;
    const existing = dedupMap[k];
    if(!existing || (!existing._outcome && r._outcome)) dedupMap[k] = r;
  });
  ALL_ROWS = Object.values(dedupMap);

  // Sort: date desc -> tier asc -> fem desc
  ALL_ROWS.sort((a,b)=>{
    if(b._date !== a._date) return b._date.localeCompare(a._date);
    const td = tierOrd(a.tier) - tierOrd(b.tier);
    if(td) return td;
    return (parseFloat(b.fem)||0) - (parseFloat(a.fem)||0);
  });

  // Populate date dropdown, default to latest date
  const dates = [...new Set(ALL_ROWS.map(r=>r._date))].sort().reverse();
  const ds = document.getElementById('filter-date');
  ds.innerHTML = '<option value="">All Dates</option>';
  dates.forEach(d=>{ const o=document.createElement('option');o.value=d;o.textContent=d;ds.appendChild(o); });
  if(dates.length) ds.value = dates[0];

  document.getElementById('controls').style.display = 'flex';
  document.getElementById('scoreboard').style.display = 'flex';
  document.getElementById('file-summary').textContent =
    scanEntries.length + ' scans · ' + checkEntries.length + ' checks · ' + ALL_ROWS.length + ' setups';

  updateScoreboard(ALL_ROWS);
  applyFilters();
}

// ── GitHub loader ────────────────────────────────────────────────────────────
async function loadFromGitHub(){
  const badge = document.getElementById('mode-badge');
  const st = document.getElementById('status');
  badge.className = 'gh-badge';
  badge.textContent = 'GITHUB';
  st.textContent = 'Fetching manifest...';

  try{
    const mRes = await fetch(GH_MANIFEST + '?_=' + Date.now());
    if(!mRes.ok) throw new Error('manifest.json not found (' + mRes.status + '). Push scans to GitHub first.');
    const manifest = await mRes.json();

    const files = manifest.files || [];
    st.textContent = 'Loading ' + files.length + ' files from GitHub...';

    const entries = files.map(fname=>({
      name: fname,
      getText: async ()=>{
        const r = await fetch(GH_RAW + fname + '?_=' + Date.now());
        if(!r.ok) throw new Error('Failed to fetch ' + fname);
        return r.text();
      }
    }));

    await processFiles(entries);

    const updated = manifest.updated ? ' · Updated ' + manifest.updated : '';
    st.textContent = 'Live from GitHub' + updated;
  } catch(e){
    badge.className = '';
    badge.textContent = '';
    st.textContent = '⚠ GitHub load failed: ' + e.message + ' — use 📁 Local to load from your computer';
  }
}

// ── Local folder loader ──────────────────────────────────────────────────────
async function loadFolder(){
  const badge = document.getElementById('mode-badge');
  const st = document.getElementById('status');
  try{
    const dir = await window.showDirectoryPicker();
    badge.className = 'local-badge';
    badge.textContent = 'LOCAL';
    st.textContent = 'Reading local folder...';

    const allHandles = [];
    for await(const e of dir.values()){
      if(e.kind === 'file') allHandles.push(e);
    }

    const entries = allHandles.map(e=>({
      name: e.name,
      getText: async ()=>(await e.getFile()).text()
    }));

    await processFiles(entries);
    st.textContent = 'Loaded from local folder · ' + dir.name;
  } catch(e){
    if(e.name !== 'AbortError'){
      badge.className = '';
      badge.textContent = '';
      st.textContent = 'Error: ' + e.message;
    }
  }
}

// ── Scoreboard & filters ─────────────────────────────────────────────────────
function updateScoreboard(rows){
  const t1 = rows.filter(r=>r.tier.includes('T1'));
  const t2 = rows.filter(r=>r.tier.includes('T2'));
  const t3 = rows.filter(r=>r.tier.includes('T3'));
  document.getElementById('sc-all').textContent = winRate(rows) || '--';
  document.getElementById('sc-t1').textContent  = winRate(t1)  || '--';
  document.getElementById('sc-t2').textContent  = winRate(t2)  || '--';
  document.getElementById('sc-t3').textContent  = winRate(t3)  || '--';
  document.getElementById('sc-r').textContent   = avgR(rows)   || '--';
  document.getElementById('sc-r1').textContent  = avgR(t1)     || '--';
  document.getElementById('sc-ea').textContent  = entryAccuracy(rows) || '--';
}

function applyFilters(){
  const tk   = document.getElementById('filter-ticker').value.toLowerCase();
  const src  = document.getElementById('filter-source').value;
  const side = document.getElementById('filter-side').value;
  const tier = document.getElementById('filter-tier').value;
  const oc   = document.getElementById('filter-outcome').value;
  const date = document.getElementById('filter-date').value;

  const filtered = ALL_ROWS.filter(r=>{
    if(tk   && !r.ticker.toLowerCase().includes(tk)) return false;
    if(src  && r._src !== src) return false;
    if(side && r.side !== side) return false;
    if(tier && !r.tier.includes(tier)) return false;
    if(oc==='UNCHECKED' && r._outcome) return false;
    if(oc && oc!=='UNCHECKED' && r._outcome !== oc) return false;
    if(date && r._date !== date) return false;
    return true;
  });

  const ocCls = o=>{
    if(o==='TARGET_HIT') return 'oc-win';
    if(o==='STOPPED') return 'oc-stop';
    if(o==='WINNING') return 'oc-live';
    if(o==='LOSING') return 'oc-loss';
    if(o==='NO_FILL'||o==='NO-FILL') return 'oc-nofill';
    if(o==='PRE_UP'||o==='PRE_DOWN'||o==='FLAT') return 'oc-live';
    if(o==='NO_DATA') return 'oc-nofill';
    return 'oc-none';
  };

  const rCls = v=>{
    const n = parseFloat(v);
    if(isNaN(n)) return '';
    return n>0 ? 'style="color:#22c55e;font-weight:600"' : 'style="color:#ef4444"';
  };

  const deltaCls = v=>{
    if(!v||v==='--') return '';
    const n = parseFloat(v);
    if(isNaN(n)) return '';
    const abs = Math.abs(n);
    if(abs<=1) return 'style="color:#22c55e"';
    if(abs<=3) return 'style="color:#fbbf24"';
    return 'style="color:#ef4444"';
  };

  document.getElementById('tbl-body').innerHTML = filtered.map(r=>{
    const srcCls = r._src==='PENNY'?'src-penny':r._src==='BIGCAP'?'src-bigcap':'src-swing';
    const srcCol = r._src==='PENNY'?'#22c55e':r._src==='BIGCAP'?'#60a5fa':'#a78bfa';
    const sideCol = r.side==='Long'?'#22c55e':'#ef4444';
    const fn = parseFloat(r.fem)||0;
    const femCol = fn>=80?'#fbbf24':fn>=60?'#22c55e':'#60a5fa';
    return `<tr class="${srcCls}">
      <td style="color:#6b7280;font-size:11px">${r._date}</td>
      <td style="font-size:10px;font-weight:700;color:${srcCol}">${r._src}</td>
      <td style="font-weight:700">${r.ticker||'--'}</td>
      <td style="color:${sideCol};font-weight:600">${r.side||'--'}</td>
      <td style="color:#94a3b8;font-size:11px">${r.mode||'--'}</td>
      <td class="${tierCls(r.tier)}">${r.tier||'--'}</td>
      <td style="color:${femCol};font-weight:600">${r.fem||'--'}</td>
      <td>${fmt(r.entry)}</td>
      <td style="color:#ef4444">${fmt(r.stop)}</td>
      <td style="color:#22c55e">${fmt(r.t1)}</td>
      <td style="font-weight:600">${r.rr?r.rr+'x':'--'}</td>
      <td style="color:${({'NANO':'#f472b6','LOW':'#fbbf24','MED':'#94a3b8','HIGH':'#60a5fa','MEGA':'#a78bfa'})[r.float_label]||'#94a3b8'};font-weight:600">${r.float_m?parseFloat(r.float_m).toFixed(1)+'M ':''}${r.float_label||'--'}</td>
      <td class="${ocCls(r._outcome)}">${r._outcome||'--'}</td>
      <td ${rCls(r._result_r)}>${r._result_r?r._result_r+'R':'--'}</td>
      <td style="color:#94a3b8">${r._last_px?'$'+parseFloat(r._last_px).toFixed(3):'--'}</td>
      <td ${deltaCls(r._entry_delta)}>${r._entry_delta||'--'}</td>
    </tr>`;
  }).join('');

  const empty = document.getElementById('empty');
  empty.style.display = filtered.length===0 && ALL_ROWS.length>0 ? 'block' : 'none';
  document.getElementById('summary').textContent = filtered.length + ' setups';
  updateScoreboard(filtered);
}

// ── Auto-load on page open ───────────────────────────────────────────────────
window.addEventListener('load', loadFromGitHub);
</script>
</body>
</html>
